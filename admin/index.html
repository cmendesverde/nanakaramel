  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;justify-content:center;min-width:0\">\n      <div style=\"position:relative;width:100%;max-width:340px\">\n        <span style=\"position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5;display:flex\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <input value=\"{{ query }}\" oninput=\"{{ setQuery }}\" placeholder=\"Buscar nombre o teléfono…\" style=\"width:100%;border:none;border-radius:999px;padding:10px 14px 10px 38px;font-family:'Lora',serif;font-size:14px;background:rgba(250,242,220,.16);color:#FAF2DC;outline:none\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button onclick=\"{{ openNew }}\" style=\"flex:0 0 auto;background:#F4A9B4;color:#7A1228;border:none;padding:10px 16px;border-radius:999px;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:7px\" style-hover=\"background:#f7bcc8\">+ Pedido<\u002Fbutton>\n  <\u002Fdiv>\n  <!-- tabs -->\n  <div style=\"max-width:1280px;margin:0 auto;padding:0 12px\">\n    <div class=\"nk-tabs\" style=\"display:flex;gap:6px\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ t.go }}\" class=\"nk-tab\" style=\"background:{{ t.bg }};color:{{ t.color }};border:none;border-radius:11px 11px 0 0;padding:11px 18px;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:8px\">\n          <span style=\"display:flex\">{{ t.icon }}<\u002Fspan><span>{{ t.label }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main style=\"flex:1;max-width:1280px;width:100%;margin:0 auto;padding:20px 16px 60px\">\n\n<!-- ============ INICIO ============ -->\n<sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n    <h2 style=\"font-family:'Lilita One',cursive;font-size:26px;color:#7A1228;margin:0 0 4px\">Hola 👋 esto es lo de hoy<\u002Fh2>\n    <p style=\"margin:0 0 20px;font-size:14.5px;color:#7c6a52\">{{ todayLabel }}<\u002Fp>\n    <div class=\"nk-kpis\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px\">\n      <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"8\">\n        <div onclick=\"{{ k.go }}\" style=\"background:#fff;border:2px solid {{ k.border }};border-radius:14px;padding:15px 16px;cursor:pointer;box-shadow:0 3px 0 #e4d8bb\">\n          <p style=\"margin:0;font-family:'Lilita One',cursive;font-size:30px;color:{{ k.color }};line-height:1\">{{ k.value }}<\u002Fp>\n          <p style=\"margin:5px 0 0;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:11.5px;color:#7c6a52\">{{ k.label }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-top:22px\" class=\"nk-scroll\">\n      <div style=\"background:#fff;border:2px solid #e4d8bb;border-radius:16px;padding:18px\">\n        <h3 style=\"font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:14px;color:#7A1228;margin:0 0 14px\">Recogidas de hoy<\u002Fh3>\n        <sc-if value=\"{{ hasToday }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:9px\">\n            <sc-for list=\"{{ todayOrders }}\" as=\"o\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ o.open }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px 13px;border:1.5px solid #eee2c8;border-radius:12px;cursor:pointer;background:#fdfaf2\" style-hover=\"border-color:#C0875A\">\n                <span style=\"width:8px;height:38px;border-radius:99px;background:{{ o.statusColor }};flex:0 0 auto\"><\u002Fspan>\n                <div style=\"flex:1;min-width:0\">\n                  <p style=\"margin:0;font-weight:600;font-size:15px\">{{ o.cliente }}<\u002Fp>\n                  <p style=\"margin:1px 0 0;font-size:12.5px;color:#7c6a52\">{{ o.tipoLabel }} · {{ o.horaLabel }}<\u002Fp>\n                <\u002Fdiv>\n                <span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;color:#7A1228\">{{ o.importeLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noToday }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"margin:0;font-size:14px;color:#9a8a70;font-style:italic\">No hay recogidas para hoy.<\u002Fp>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"background:#7A1228;color:#FAF2DC;border-radius:16px;padding:18px\">\n        <p style=\"margin:0;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:12.5px;opacity:.8\">Facturación de este mes<\u002Fp>\n        <p style=\"margin:8px 0 0;font-family:'Lilita One',cursive;font-size:42px;line-height:1\">{{ revenueLabel }}<\u002Fp>\n        <p style=\"margin:6px 0 18px;font-size:13px;opacity:.8\">{{ revenueCount }} pedidos contabilizados<\u002Fp>\n        <div style=\"height:1px;background:rgba(250,242,220,.2);margin-bottom:14px\"><\u002Fdiv>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6\">Pendientes de preparar: <strong>{{ pendingCount }}<\u002Fstrong><br>Listos para entregar: <strong>{{ readyCount }}<\u002Fstrong><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ KANBAN ============ -->\n<sc-if value=\"{{ isKanban }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px\">\n      <h2 style=\"font-family:'Lilita One',cursive;font-size:24px;color:#7A1228;margin:0\">Pedidos<\u002Fh2>\n      <div style=\"display:flex;gap:7px;flex-wrap:wrap\">\n        <sc-for list=\"{{ statusFilters }}\" as=\"f\" hint-placeholder-count=\"8\">\n          <button onclick=\"{{ f.toggle }}\" style=\"background:{{ f.bg }};color:{{ f.color }};border:1.5px solid {{ f.border }};border-radius:999px;padding:6px 12px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:11px;cursor:pointer\">{{ f.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 14px;font-size:12.5px;color:#9a8a70\">Arrastra una tarjeta entre columnas para cambiar su estado · o tócala para abrir su ficha<\u002Fp>\n    <div class=\"nk-scroll\" style=\"display:flex;gap:14px;overflow-x:auto;padding-bottom:14px;align-items:flex-start\">\n      <sc-for list=\"{{ columns }}\" as=\"col\" hint-placeholder-count=\"7\">\n        <div ondragover=\"{{ col.onDragOver }}\" ondrop=\"{{ col.onDrop }}\" style=\"flex:0 0 268px;width:268px;background:#fff;border:2px solid {{ col.border }};border-radius:14px;display:flex;flex-direction:column;max-height:72vh\">\n          <div style=\"padding:12px 14px;border-bottom:2px solid {{ col.border }};display:flex;align-items:center;justify-content:space-between;border-radius:12px 12px 0 0;background:{{ col.headBg }}\">\n            <span style=\"font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:12.5px;color:{{ col.color }}\">{{ col.label }}<\u002Fspan>\n            <span style=\"min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:{{ col.color }};color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;display:inline-flex;align-items:center;justify-content:center\">{{ col.count }}<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"nk-scroll\" style=\"padding:10px;display:flex;flex-direction:column;gap:9px;overflow-y:auto\">\n            <sc-for list=\"{{ col.cards }}\" as=\"c\" hint-placeholder-count=\"2\">\n              <div draggable=\"true\" ondragstart=\"{{ c.onDragStart }}\" onclick=\"{{ c.open }}\" style=\"background:#fdfaf2;border:1.5px solid #eee2c8;border-left:5px solid {{ c.statusColor }};border-radius:10px;padding:11px 12px;cursor:pointer\" style-hover=\"border-color:#C0875A\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n                  <p style=\"margin:0;font-weight:600;font-size:14.5px;line-height:1.15\">{{ c.cliente }}<\u002Fp>\n                  <span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:#7A1228;flex:0 0 auto\">{{ c.importeLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"margin:5px 0 0;font-size:12.5px;color:#5d4f3c;line-height:1.35\">{{ c.tipoLabel }}<\u002Fp>\n                <div style=\"display:flex;align-items:center;gap:10px;margin-top:8px;font-size:11.5px;color:#9a8a70\">\n                  <span style=\"display:inline-flex;align-items:center;gap:4px\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M8 3v4M16 3v4\"><\u002Fpath><\u002Fsvg>{{ c.fechaLabel }}<\u002Fspan>\n                  <span style=\"display:inline-flex;align-items:center;gap:4px\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 4h14l-2 7H7zM5 4l-1-2\"><\u002Fpath><circle cx=\"9\" cy=\"20\" r=\"1.4\"><\u002Fcircle><circle cx=\"17\" cy=\"20\" r=\"1.4\"><\u002Fcircle><\u002Fsvg>{{ c.phone }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ col.empty }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"margin:6px 4px;font-size:12.5px;color:#bcae93;font-style:italic\">Vacío<\u002Fp>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ CALENDARIO ============ -->\n<sc-if value=\"{{ isCalendar }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px\">\n      <h2 style=\"font-family:'Lilita One',cursive;font-size:24px;color:#7A1228;margin:0;flex:1;text-transform:capitalize\">{{ monthLabel }}<\u002Fh2>\n      <button onclick=\"{{ prevMonth }}\" style=\"width:40px;height:40px;border-radius:11px;border:2px solid #7A1228;background:#fff;color:#7A1228;font-size:20px;cursor:pointer\">‹<\u002Fbutton>\n      <button onclick=\"{{ todayMonth }}\" style=\"height:40px;padding:0 14px;border-radius:11px;border:2px solid #7A1228;background:#fff;color:#7A1228;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;font-size:12px;cursor:pointer\">Hoy<\u002Fbutton>\n      <button onclick=\"{{ nextMonth }}\" style=\"width:40px;height:40px;border-radius:11px;border:2px solid #7A1228;background:#fff;color:#7A1228;font-size:20px;cursor:pointer\">›<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px\">\n      <sc-for list=\"{{ weekdays }}\" as=\"w\" hint-placeholder-count=\"7\">\n        <p style=\"margin:0;text-align:center;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:11px;color:#9a8a70\">{{ w }}<\u002Fp>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:6px\">\n      <sc-for list=\"{{ calendarDays }}\" as=\"d\" hint-placeholder-count=\"35\">\n        <div style=\"min-height:96px;background:{{ d.bg }};border:1.5px solid {{ d.border }};border-radius:10px;padding:6px 6px;display:flex;flex-direction:column;gap:3px;opacity:{{ d.opacity }}\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between\">\n            <span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:12.5px;color:{{ d.numColor }}\">{{ d.num }}<\u002Fspan>\n            <sc-if value=\"{{ d.conflict }}\" hint-placeholder-val=\"{{ false }}\">\n              <span title=\"Conflicto de horario\" style=\"display:inline-flex;color:#D97706\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M12 2 1 21h22z\"><\u002Fpath><path d=\"M12 9v5M12 17.5v.5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <sc-for list=\"{{ d.orders }}\" as=\"o\" hint-placeholder-count=\"0\">\n            <button onclick=\"{{ o.open }}\" style=\"text-align:left;border:none;background:{{ o.chipBg }};color:{{ o.chipColor }};border-radius:6px;padding:3px 6px;font-size:11px;cursor:pointer;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Lora',serif\">{{ o.horaLabel }} {{ o.cliente }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"margin:14px 0 0;font-size:12px;color:#9a8a70;display:inline-flex;align-items:center;gap:6px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#D97706\" stroke-width=\"2.2\"><path d=\"M12 2 1 21h22z\"><\u002Fpath><path d=\"M12 9v5\"><\u002Fpath><\u002Fsvg> El triángulo indica dos o más recogidas a la misma hora.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ CLIENTES ============ -->\n<sc-if value=\"{{ isClients }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <h2 style=\"font-family:'Lilita One',cursive;font-size:24px;color:#7A1228;margin:0 0 16px\">Clientes<\u002Fh2>\n    <sc-if value=\"{{ hasClients }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px\">\n        <sc-for list=\"{{ clients }}\" as=\"cl\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ cl.open }}\" style=\"background:#fff;border:2px solid #e4d8bb;border-radius:14px;padding:16px;cursor:pointer;box-shadow:0 3px 0 #e4d8bb\" style-hover=\"border-color:#C0875A\">\n            <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:12px\">\n              <span style=\"width:42px;height:42px;border-radius:50%;background:#F6E2E6;color:#7A1228;display:flex;align-items:center;justify-content:center;font-family:'Lilita One',cursive;font-size:18px;flex:0 0 auto\">{{ cl.initials }}<\u002Fspan>\n              <div style=\"min-width:0\">\n                <p style=\"margin:0;font-weight:600;font-size:15.5px;line-height:1.1\">{{ cl.nombre }}<\u002Fp>\n                <p style=\"margin:2px 0 0;font-size:12.5px;color:#7c6a52\">{{ cl.telefono }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px\">\n              <div style=\"flex:1;background:#fdfaf2;border:1px solid #eee2c8;border-radius:9px;padding:8px;text-align:center\">\n                <p style=\"margin:0;font-family:'Lilita One',cursive;font-size:19px;color:#7A1228\">{{ cl.count }}<\u002Fp>\n                <p style=\"margin:0;font-size:10px;color:#9a8a70;text-transform:uppercase;letter-spacing:.04em\">Pedidos<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"flex:1;background:#fdfaf2;border:1px solid #eee2c8;border-radius:9px;padding:8px;text-align:center\">\n                <p style=\"margin:0;font-family:'Lilita One',cursive;font-size:19px;color:#7A1228\">{{ cl.totalLabel }}<\u002Fp>\n                <p style=\"margin:0;font-size:10px;color:#9a8a70;text-transform:uppercase;letter-spacing:.04em\">Gastado<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"margin:10px 0 0;font-size:12px;color:#7c6a52\">Último: {{ cl.lastLabel }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ noClients }}\" hint-placeholder-val=\"{{ false }}\">\n      <p style=\"margin:0;font-size:14px;color:#9a8a70;font-style:italic\">Aún no hay clientes registrados.<\u002Fp>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fmain>\n<\u002Fdiv>\n\n<!-- ============ FICHA DE PEDIDO ============ -->\n<div onclick=\"{{ closeFicha }}\" style=\"position:fixed;inset:0;z-index:70;background:rgba(42,20,24,.5);display:flex;align-items:flex-end;justify-content:center;transition:opacity .25s;opacity:{{ fichaOpacity }};pointer-events:{{ fichaEvents }}\">\n  <div onclick=\"{{ stop }}\" class=\"nk-scroll\" style=\"width:min(560px,100%);max-height:92vh;overflow-y:auto;background:#FAF2DC;border-radius:22px 22px 0 0;box-shadow:0 -16px 50px rgba(0,0,0,.3);transform:translateY({{ fichaY }});transition:transform .3s cubic-bezier(.32,1.2,.5,1)\">\n    <div style=\"position:sticky;top:0;background:{{ fichaStatusColor }};color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;z-index:2\">\n      <div>\n        <p style=\"margin:0;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:11px;opacity:.85\">{{ fichaStatusLabel }}<\u002Fp>\n        <p style=\"margin:2px 0 0;font-family:'Lilita One',cursive;font-size:22px;line-height:1\">{{ fichaCliente }}<\u002Fp>\n      <\u002Fdiv>\n      <button onclick=\"{{ closeFicha }}\" style=\"background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:22px;cursor:pointer;line-height:1\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"padding:18px 20px 28px\">\n      <!-- acciones rápidas -->\n      <p style=\"margin:0 0 8px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;color:#7c6a52\">Cambiar estado<\u002Fp>\n      <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px\">\n        <sc-for list=\"{{ fichaActions }}\" as=\"a\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ a.do }}\" style=\"background:{{ a.bg }};color:{{ a.color }};border:1.5px solid {{ a.border }};border-radius:999px;padding:8px 13px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.03em;font-size:11px;cursor:pointer\">{{ a.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- datos cliente -->\n      <div style=\"background:#fff;border:1.5px solid #eee2c8;border-radius:13px;padding:14px 16px;margin-bottom:12px\">\n        <p style=\"margin:0 0 9px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;color:#7A1228\">Cliente<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:5px;font-size:14px\">\n          <p style=\"margin:0\"><strong>{{ fichaCliente }}<\u002Fstrong><\u002Fp>\n          <a href=\"{{ fichaWaLink }}\" target=\"_blank\" rel=\"noopener\" style=\"color:#1f8a5b;text-decoration:none;display:inline-flex;align-items:center;gap:7px\">{{ fichaTel }} · escribir por WhatsApp →<\u002Fa>\n          <p style=\"margin:0;color:#5d4f3c\">{{ fichaEmail }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- pedido -->\n      <div style=\"background:#fff;border:1.5px solid #eee2c8;border-radius:13px;padding:14px 16px;margin-bottom:12px\">\n        <p style=\"margin:0 0 9px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;color:#7A1228\">Pedido<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:6px;font-size:14px\">\n          <sc-for list=\"{{ fichaItems }}\" as=\"it\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;justify-content:space-between;gap:10px\">\n              <span>{{ it.line }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ fichaHasPerso }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"margin:10px 0 0;font-size:13.5px;color:#5d4f3c;line-height:1.5;border-top:1px dashed #e4d8bb;padding-top:10px\"><strong>Personalización:<\u002Fstrong> {{ fichaPerso }}<\u002Fp>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ fichaHasNotes }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"margin:8px 0 0;font-size:13.5px;color:#5d4f3c;line-height:1.5\"><strong>Notas:<\u002Fstrong> {{ fichaNotes }}<\u002Fp>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- recogida + importe -->\n      <div style=\"display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap\">\n        <div style=\"flex:1;min-width:150px;background:#fff;border:1.5px solid #eee2c8;border-radius:13px;padding:14px 16px\">\n          <p style=\"margin:0 0 9px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;color:#7A1228\">Recogida<\u002Fp>\n          <p style=\"margin:0;font-size:15px;font-weight:600\">{{ fichaFecha }}<\u002Fp>\n          <p style=\"margin:2px 0 0;font-size:13.5px;color:#5d4f3c\">{{ fichaHora }}<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:150px;background:#fff;border:1.5px solid #eee2c8;border-radius:13px;padding:14px 16px\">\n          <p style=\"margin:0 0 9px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;color:#7A1228\">Importe final (€)<\u002Fp>\n          <input value=\"{{ fichaImporteFinal }}\" oninput=\"{{ setImporteFinal }}\" inputmode=\"decimal\" placeholder=\"{{ fichaImporteEst }}\" style=\"width:100%;border:1.5px solid #C0875A;border-radius:9px;padding:9px 11px;font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;color:#7A1228;background:#fdfaf2\">\n          <p style=\"margin:6px 0 0;font-size:11.5px;color:#9a8a70\">Estimado web: {{ fichaImporteEst }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- editar notas -->\n      <div style=\"background:#fff;border:1.5px solid #eee2c8;border-radius:13px;padding:14px 16px;margin-bottom:16px\">\n        <p style=\"margin:0 0 8px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;color:#7A1228\">Nota interna<\u002Fp>\n        <textarea value=\"{{ fichaInternalNote }}\" oninput=\"{{ setInternalNote }}\" placeholder=\"Añade una nota para la producción…\" style=\"width:100%;min-height:64px;resize:vertical;border:1.5px solid #C0875A;border-radius:9px;padding:10px 12px;font-family:'Lora',serif;font-size:14px;background:#fdfaf2;color:#2A1418\"><\u002Ftextarea>\n      <\u002Fdiv>\n\n      <!-- historial -->\n      <div style=\"margin-bottom:18px\">\n        <p style=\"margin:0 0 8px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;color:#7c6a52\">Historial<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:6px\">\n          <sc-for list=\"{{ fichaHistory }}\" as=\"h\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;align-items:center;gap:9px;font-size:12.5px;color:#5d4f3c\">\n              <span style=\"width:8px;height:8px;border-radius:50%;background:{{ h.color }};flex:0 0 auto\"><\u002Fspan>\n              <span style=\"flex:1\">{{ h.label }}<\u002Fspan>\n              <span style=\"color:#9a8a70\">{{ h.when }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- acciones destructivas / extra -->\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid #e4d8bb;padding-top:14px\">\n        <button onclick=\"{{ duplicateOrder }}\" style=\"background:#fff;color:#7A1228;border:1.5px solid #7A1228;border-radius:999px;padding:10px 15px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:11.5px;cursor:pointer\">Duplicar<\u002Fbutton>\n        <button onclick=\"{{ anularOrder }}\" style=\"background:#fff;color:#B91C1C;border:1.5px solid #e3b3b3;border-radius:999px;padding:10px 15px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:11.5px;cursor:pointer\">Anular<\u002Fbutton>\n        <button onclick=\"{{ deleteOrder }}\" style=\"background:#B91C1C;color:#fff;border:none;border-radius:999px;padding:10px 15px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:11.5px;cursor:pointer;margin-left:auto\">Eliminar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ NUEVO PEDIDO MANUAL ============ -->\n<div onclick=\"{{ closeNew }}\" style=\"position:fixed;inset:0;z-index:75;background:rgba(42,20,24,.5);display:flex;align-items:center;justify-content:center;padding:16px;transition:opacity .25s;opacity:{{ newOpacity }};pointer-events:{{ newEvents }}\">\n  <div onclick=\"{{ stop }}\" class=\"nk-scroll\" style=\"width:min(460px,100%);max-height:90vh;overflow-y:auto;background:#FAF2DC;border:2px solid #7A1228;border-radius:20px;box-shadow:0 24px 60px rgba(0,0,0,.35);transform:scale({{ newScale }});transition:transform .28s cubic-bezier(.34,1.4,.5,1)\">\n    <div style=\"background:#7A1228;color:#FAF2DC;padding:15px 20px;display:flex;align-items:center;justify-content:space-between;border-radius:18px 18px 0 0\">\n      <h3 style=\"margin:0;font-family:'Lilita One',cursive;font-size:20px\">Nuevo pedido manual<\u002Fh3>\n      <button onclick=\"{{ closeNew }}\" style=\"background:none;border:none;color:#FAF2DC;font-size:26px;cursor:pointer;line-height:1\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"padding:18px 20px 22px;display:flex;flex-direction:column;gap:12px\">\n      <div><label style=\"font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:11px;color:#7c6a52;display:block;margin-bottom:5px\">Nombre del cliente *<\u002Flabel><input value=\"{{ nf.nombre }}\" oninput=\"{{ nfSet.nombre }}\" style=\"width:100%;border:1.5px solid #C0875A;border-radius:10px;padding:11px 13px;font-family:'Lora',serif;font-size:15px;background:#fff\"><\u002Fdiv>\n      <div style=\"display:flex;gap:10px\">\n        <div style=\"flex:1\"><label style=\"font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:11px;color:#7c6a52;display:block;margin-bottom:5px\">Teléfono<\u002Flabel><input value=\"{{ nf.telefono }}\" oninput=\"{{ nfSet.telefono }}\" inputmode=\"tel\" style=\"width:100%;border:1.5px solid #C0875A;border-radius:10px;padding:11px 13px;font-family:'Lora',serif;font-size:15px;background:#fff\"><\u002Fdiv>\n        <div style=\"flex:1\"><label style=\"font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:11px;color:#7c6a52;display:block;margin-bottom:5px\">Importe (€)<\u002Flabel><input value=\"{{ nf.importe }}\" oninput=\"{{ nfSet.importe }}\" inputmode=\"decimal\" style=\"width:100%;border:1.5px solid #C0875A;border-radius:10px;padding:11px 13px;font-family:'Lora',serif;font-size:15px;background:#fff\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div><label style=\"font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:11px;color:#7c6a52;display:block;margin-bottom:5px\">Pedido (qué lleva)<\u002Flabel><textarea value=\"{{ nf.tipo }}\" oninput=\"{{ nfSet.tipo }}\" placeholder=\"Ej.: Tarta de queso vasca 10-12 + 6 cookies\" style=\"width:100%;min-height:60px;resize:vertical;border:1.5px solid #C0875A;border-radius:10px;padding:11px 13px;font-family:'Lora',serif;font-size:14px;background:#fff\"><\u002Ftextarea><\u002Fdiv>\n      <div style=\"display:flex;gap:10px\">\n        <div style=\"flex:1\"><label style=\"font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:11px;color:#7c6a52;display:block;margin-bottom:5px\">Fecha recogida<\u002Flabel><input type=\"date\" value=\"{{ nf.fecha }}\" oninput=\"{{ nfSet.fecha }}\" style=\"width:100%;border:1.5px solid #C0875A;border-radius:10px;padding:10px 12px;font-family:'Lora',serif;font-size:14px;background:#fff\"><\u002Fdiv>\n        <div style=\"flex:1\"><label style=\"font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:11px;color:#7c6a52;display:block;margin-bottom:5px\">Hora<\u002Flabel><input value=\"{{ nf.hora }}\" oninput=\"{{ nfSet.hora }}\" placeholder=\"11:30\" style=\"width:100%;border:1.5px solid #C0875A;border-radius:10px;padding:11px 13px;font-family:'Lora',serif;font-size:14px;background:#fff\"><\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ newError }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"margin:0;background:#F7E0E0;border-left:4px solid #B91C1C;border-radius:8px;padding:9px 12px;font-size:13px;color:#7A1228\">{{ newErrorMsg }}<\u002Fp>\n      <\u002Fsc-if>\n      <button onclick=\"{{ saveNew }}\" style=\"background:#1f8a5b;color:#fff;border:none;border-radius:999px;padding:14px;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:14px;cursor:pointer;margin-top:4px\">Guardar pedido<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  STATUSES = [\n    { key:'nuevo',       label:'Nuevo',                color:'#2563EB', bg:'#E8EEFC', head:'#EEF3FD', border:'#C7D8F7' },\n    { key:'confirmado',  label:'Confirmado',           color:'#7A1228', bg:'#F6E2E6', head:'#FBEDF0', border:'#EBC4CD' },\n    { key:'pagado',      label:'Pagado',               color:'#15803D', bg:'#E3F2E9', head:'#EDF7F0', border:'#C2E2CF' },\n    { key:'elaboracion', label:'En elaboración',       color:'#D97706', bg:'#FBEEDD', head:'#FDF4E8', border:'#F2D6AC' },\n    { key:'listo',       label:'Listo para entregar',  color:'#0E7490', bg:'#DEF0F4', head:'#EAF6F9', border:'#B7DEE7' },\n    { key:'entregado',   label:'Entregado',            color:'#6B7280', bg:'#ECEDEF', head:'#F3F4F5', border:'#D4D7DB' },\n    { key:'anulado',     label:'Anulado',              color:'#B91C1C', bg:'#F7E0E0', head:'#FBECEC', border:'#E8C0C0' },\n  ];\n\n  state = {\n    view: 'home',\n    query: '',\n    statusFilter: '',      // '' = todos\n    orders: [],\n    selectedId: null,\n    calYear: 2026, calMonth: 5,  // junio 2026 (0-indexed)\n    newOpen: false,\n    newForm: { nombre:'', telefono:'', importe:'', tipo:'', fecha:'', hora:'' },\n    newError: '',\n    fichaImporteFinal: '',\n    fichaInternalNote: '',\n  };\n\n  STORE_KEY = 'nk_admin_orders_v1';\n  TODAY = '2026-06-22';\n\n  componentDidMount(){\n    let loaded = null;\n    try { const raw = localStorage.getItem(this.STORE_KEY); if(raw) loaded = JSON.parse(raw); } catch(_){}\n    if(!loaded || !loaded.length) loaded = this.seed();\n    this.setState({ orders: loaded });\n    // Hook a la API real (Neon vía Vercel). Si no existe aún, se ignora.\n    this.syncFromApi();\n  }\n\n  async syncFromApi(){\n    try {\n      const res = await fetch('/api/orders', { headers:{ 'Accept':'application/json' } });\n      if(!res.ok) return;\n      const data = await res.json();\n      if(Array.isArray(data) && data.length){\n        const norm = data.map(d => this.normalize(d));\n        this.setState({ orders: norm });\n        this.persist(norm);\n      }\n    } catch(_){ /* API no disponible todavía: seguimos con datos locales */ }\n  }\n\n  normalize(d){\n    return {\n      id: d.id || ('srv-' + Math.random().toString(36).slice(2,9)),\n      nombre: d.nombre || (d.cliente && d.cliente.nombre) || 'Sin nombre',\n      telefono: d.telefono || (d.cliente && d.cliente.telefono) || '',\n      email: d.email || (d.cliente && d.cliente.email) || '',\n      tipo: d.tipo || '',\n      items: d.items || d.productos || [],\n      personalizacion: d.personalizacion || '',\n      notas: d.notas || '',\n      notaInterna: d.nota_interna || d.notaInterna || '',\n      importeEst: Number(d.importe_estimado ?? d.importeEst ?? 0),\n      importeFinal: d.importe_final != null ? Number(d.importe_final) : (d.importeFinal != null ? Number(d.importeFinal) : null),\n      fecha: d.fecha || (d.recogida && d.recogida.fecha) || '',\n      hora: d.hora || (d.recogida && d.recogida.hora) || '',\n      estado: d.estado || 'nuevo',\n      historial: d.historial || [{ estado: d.estado || 'nuevo', ts: d.created_at || this.TODAY }],\n      createdAt: d.created_at || d.createdAt || this.TODAY,\n    };\n  }\n\n  seed(){\n    const mk = (o) => ({ personalizacion:'', notas:'', notaInterna:'', importeFinal:null, email:'',\n      historial:[{estado:o.estado, ts:o.createdAt}], items:[], ...o });\n    return [\n      mk({ id:'s1', nombre:'Lucía Fernández', telefono:'34611223344', email:'lucia@email.com', tipo:'Tarta de queso vasca (10-12) + 6 cookies', items:[{name:'Tarta de queso vasca',qty:1},{name:'Cookies surtidas',qty:6}], importeEst:42, fecha:'2026-06-22', hora:'12:00', estado:'nuevo', createdAt:'2026-06-21' }),\n      mk({ id:'s2', nombre:'Marcos Ruiz', telefono:'34622334455', tipo:'Tarta personalizada cumpleaños (15-20)', personalizacion:'Tonos pastel, flores, nombre \"Olivia\". Bizcocho chocolate, buttercream vainilla rosa.', items:[{name:'Tarta personalizada 15-20',qty:1}], importeEst:65, importeFinal:70, fecha:'2026-06-22', hora:'12:00', estado:'elaboracion', createdAt:'2026-06-19' }),\n      mk({ id:'s3', nombre:'Paula Gómez', telefono:'34633445566', email:'paula.g@email.com', tipo:'12 cookies Piña Colada', items:[{name:'Cookie Piña Colada',qty:12}], importeEst:30, importeFinal:30, fecha:'2026-06-22', hora:'18:00', estado:'listo', createdAt:'2026-06-18' }),\n      mk({ id:'s4', nombre:'Javier Moreno', telefono:'34644556677', tipo:'Red Velvet (15-20) + alfajores', items:[{name:'Tarta Red Velvet',qty:1},{name:'Alfajores',qty:12}], importeEst:58, estado:'confirmado', fecha:'2026-06-24', hora:'11:30', createdAt:'2026-06-20' }),\n      mk({ id:'s5', nombre:'Ana Torres', telefono:'34655667788', email:'ana.t@email.com', tipo:'Empanada gallega + focaccia', items:[{name:'Empanada gallega',qty:1},{name:'Focaccia',qty:2}], importeEst:34, importeFinal:34, estado:'pagado', fecha:'2026-06-25', hora:'19:00', createdAt:'2026-06-21' }),\n      mk({ id:'s6', nombre:'Lucía Fernández', telefono:'34611223344', email:'lucia@email.com', tipo:'Brownie en formato tarta', items:[{name:'Tarta brownie',qty:1}], importeEst:28, importeFinal:28, estado:'entregado', fecha:'2026-06-12', hora:'12:30', createdAt:'2026-06-09' }),\n      mk({ id:'s7', nombre:'Diego Sanz', telefono:'34666778899', tipo:'Mousse de limón (10-12)', items:[{name:'Tarta mousse de limón',qty:1}], importeEst:36, estado:'nuevo', fecha:'2026-06-26', hora:'12:00', createdAt:'2026-06-22' }),\n      mk({ id:'s8', nombre:'Marta Vidal', telefono:'34677889900', tipo:'24 mini cookies surtidas', items:[{name:'Mini cookies surtidas',qty:24}], importeEst:26, estado:'confirmado', fecha:'2026-06-24', hora:'11:30', createdAt:'2026-06-21' }),\n    ];\n  }\n\n  persist(orders){ try { localStorage.setItem(this.STORE_KEY, JSON.stringify(orders || this.state.orders)); } catch(_){} }\n\n  // ---------- helpers ----------\n  st(key){ return this.STATUSES.find(s => s.key===key) || this.STATUSES[0]; }\n  money(n){ const v = Number(n||0); return (Number.isInteger(v) ? v : v.toFixed(2)) + ' €'; }\n  MES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];\n  DOW = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];\n  fmtFecha(f){ if(!f) return '—'; const [y,m,d]=f.split('-'); return Number(d)+' '+(this.MES[Number(m)-1]||'').slice(0,3); }\n  fmtFechaLarga(f){ if(!f) return '—'; const dt=new Date(f+'T12:00:00'); return this.DOW[dt.getDay()]+', '+dt.getDate()+' de '+this.MES[dt.getMonth()]; }\n  orderAmount(o){ return o.importeFinal != null && o.importeFinal !== '' ? Number(o.importeFinal) : Number(o.importeEst||0); }\n\n  matchesQuery(o){\n    const q = this.state.query.trim().toLowerCase();\n    if(!q) return true;\n    return (o.nombre||'').toLowerCase().includes(q) || (o.telefono||'').includes(q);\n  }\n  visibleOrders(){ return this.state.orders.filter(o => this.matchesQuery(o)); }\n\n  // ---------- mutations ----------\n  update(id, patch, histStatus){\n    const orders = this.state.orders.map(o => {\n      if(o.id!==id) return o;\n      const next = { ...o, ...patch };\n      if(histStatus){ next.historial = [...(o.historial||[]), { estado: histStatus, ts: this.TODAY }]; }\n      return next;\n    });\n    this.setState({ orders }); this.persist(orders); this.pushApi(id, patch);\n  }\n  async pushApi(id, patch){\n    try { await fetch('/api/orders/'+id, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(patch) }); } catch(_){}\n  }\n  setStatus(id, status){ this.update(id, { estado: status }, status); }\n  selectOrder(id){ const o=this.state.orders.find(x=>x.id===id); this.setState({ selectedId:id, fichaImporteFinal: (o && o.importeFinal!=null)?String(o.importeFinal):'', fichaInternalNote:(o&&o.notaInterna)||'' }); }\n  closeFicha(){ this.commitFicha(); this.setState({ selectedId:null }); }\n  commitFicha(){\n    const id=this.state.selectedId; if(!id) return;\n    const patch={};\n    const imp=this.state.fichaImporteFinal; if(imp!==''){ const n=parseFloat(String(imp).replace(',','.')); if(!isNaN(n)) patch.importeFinal=n; }\n    patch.notaInterna=this.state.fichaInternalNote||'';\n    this.update(id, patch);\n  }\n  duplicateOrder(){\n    const o=this.state.orders.find(x=>x.id===this.state.selectedId); if(!o) return;\n    const copy={ ...o, id:'d'+Date.now(), estado:'nuevo', importeFinal:null, historial:[{estado:'nuevo',ts:this.TODAY}], createdAt:this.TODAY };\n    const orders=[copy, ...this.state.orders]; this.setState({ orders, selectedId:null }); this.persist(orders);\n  }\n  anularOrder(){ const id=this.state.selectedId; if(id){ this.setStatus(id,'anulado'); this.setState({selectedId:null}); } }\n  deleteOrder(){\n    const id=this.state.selectedId; if(!id) return;\n    const orders=this.state.orders.filter(o=>o.id!==id); this.setState({ orders, selectedId:null }); this.persist(orders);\n    try { fetch('/api/orders/'+id, { method:'DELETE' }); } catch(_){}\n  }\n\n  // ---------- nuevo manual ----------\n  openNew(){ this.setState({ newOpen:true, newError:'', newForm:{ nombre:'', telefono:'', importe:'', tipo:'', fecha:'', hora:'' } }); }\n  closeNew(){ this.setState({ newOpen:false }); }\n  nfSet(field, v){ this.setState(s => ({ newForm:{ ...s.newForm, [field]: v } })); }\n  saveNew(){\n    const f=this.state.newForm;\n    if(!f.nombre.trim()){ this.setState({ newError:'Pon al menos el nombre del cliente.' }); return; }\n    const o={ id:'m'+Date.now(), nombre:f.nombre.trim(), telefono:f.telefono.trim(), email:'', tipo:f.tipo.trim()||'Pedido manual',\n      items:[], personalizacion:'', notas:'', notaInterna:'', importeEst:parseFloat(String(f.importe).replace(',','.'))||0, importeFinal:null,\n      fecha:f.fecha, hora:f.hora.trim(), estado:'nuevo', historial:[{estado:'nuevo',ts:this.TODAY}], createdAt:this.TODAY };\n    const orders=[o, ...this.state.orders]; this.setState({ orders, newOpen:false }); this.persist(orders);\n    try { fetch('/api/orders', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(o) }); } catch(_){}\n  }\n\n  // ---------- calendar nav ----------\n  prevMonth(){ this.setState(s => { let m=s.calMonth-1,y=s.calYear; if(m<0){m=11;y--;} return {calMonth:m,calYear:y}; }); }\n  nextMonth(){ this.setState(s => { let m=s.calMonth+1,y=s.calYear; if(m>11){m=0;y++;} return {calMonth:m,calYear:y}; }); }\n  todayMonth(){ this.setState({ calYear:2026, calMonth:5 }); }\n\n  renderVals(){\n    const view = this.state.view;\n    const vis = this.visibleOrders();\n    const icon = (p) => React.createElement('svg', { width:15, height:15, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round', dangerouslySetInnerHTML:{__html:p} });\n\n    const tabsDef = [\n      { key:'home',     label:'Inicio',     p:'<path d=\"M3 11l9-8 9 8\"/><path d=\"M5 10v10h14V10\"/>' },\n      { key:'kanban',   label:'Pedidos',    p:'<rect x=\"3\" y=\"4\" width=\"5\" height=\"16\" rx=\"1\"/><rect x=\"10\" y=\"4\" width=\"5\" height=\"11\" rx=\"1\"/><rect x=\"17\" y=\"4\" width=\"4\" height=\"8\" rx=\"1\"/>' },\n      { key:'calendar', label:'Calendario', p:'<rect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"2\"/><path d=\"M3 9h18M8 3v4M16 3v4\"/>' },\n      { key:'clients',  label:'Clientes',   p:'<circle cx=\"9\" cy=\"8\" r=\"3\"/><path d=\"M3 20c0-3 3-5 6-5s6 2 6 5\"/><path d=\"M16 4a3 3 0 0 1 0 6M21 20c0-2-1-3.5-3-4.3\"/>' },\n    ];\n    const tabs = tabsDef.map(t => ({\n      label:t.label, icon:icon(t.p),\n      bg: view===t.key ? '#EFE7D6' : 'rgba(250,242,220,.12)',\n      color: view===t.key ? '#7A1228' : '#FAF2DC',\n      go: () => this.setState({ view:t.key }),\n    }));\n\n    // ----- KPIs -----\n    const cnt = (k) => this.state.orders.filter(o=>o.estado===k).length;\n    const todayOrders = this.state.orders.filter(o => o.fecha===this.TODAY && o.estado!=='anulado').sort((a,b)=>(a.hora||'').localeCompare(b.hora||''));\n    const monthRevOrders = this.state.orders.filter(o => o.estado==='entregado' && (o.fecha||'').slice(0,7)==='2026-06');\n    const revenue = monthRevOrders.reduce((s,o)=>s+this.orderAmount(o),0);\n    const kpis = [\n      { key:'nuevo', label:'Nuevos', value:cnt('nuevo'), color:'#2563EB', border:'#C7D8F7' },\n      { key:'confirmado', label:'Confirmados', value:cnt('confirmado'), color:'#7A1228', border:'#EBC4CD' },\n      { key:'today', label:'Para hoy', value:todayOrders.length, color:'#D97706', border:'#F2D6AC' },\n      { key:'elaboracion', label:'En elaboración', value:cnt('elaboracion'), color:'#D97706', border:'#F2D6AC' },\n      { key:'listo', label:'Listos', value:cnt('listo'), color:'#0E7490', border:'#B7DEE7' },\n      { key:'entregado', label:'Entregados (mes)', value:monthRevOrders.length, color:'#6B7280', border:'#D4D7DB' },\n      { key:'pendientes', label:'Pendientes', value:this.state.orders.filter(o=>['nuevo','confirmado','pagado','elaboracion'].includes(o.estado)).length, color:'#7A1228', border:'#EBC4CD' },\n      { key:'mes', label:'Facturado mes', value:this.money(revenue), color:'#15803D', border:'#C2E2CF' },\n    ].map(k => ({ ...k, go: () => this.setState({ view: k.key==='today'||k.key==='mes'||k.key==='pendientes' ? 'kanban' : 'kanban' }) }));\n\n    // ----- Kanban -----\n    const statusFilters = [{ key:'', label:'Todos' }, ...this.STATUSES].map(s => {\n      const active = this.state.statusFilter===s.key;\n      const stc = s.key ? s : { color:'#7A1228', bg:'#F6E2E6', border:'#EBC4CD' };\n      return { label:s.label, bg: active?(stc.color):'#fff', color: active?'#fff':(s.key?stc.color:'#7A1228'), border: s.key?stc.border:'#EBC4CD', toggle: () => this.setState({ statusFilter: this.state.statusFilter===s.key?'':s.key }) };\n    });\n    const colSource = this.state.statusFilter ? this.STATUSES.filter(s=>s.key===this.state.statusFilter) : this.STATUSES;\n    const columns = colSource.map(s => {\n      const cards = vis.filter(o => o.estado===s.key).sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''))\n        .map(o => ({\n          cliente:o.nombre, phone:o.telefono||'—', tipoLabel:o.tipo||'—',\n          fechaLabel:this.fmtFecha(o.fecha), importeLabel:this.money(this.orderAmount(o)), statusColor:s.color,\n          open: () => this.selectOrder(o.id),\n          onDragStart: (e) => { this.dragId=o.id; try{e.dataTransfer.effectAllowed='move';}catch(_){ } },\n        }));\n      return { label:s.label, color:s.color, border:s.border, headBg:s.head, count:cards.length, cards, empty:cards.length===0,\n        onDragOver:(e)=>e.preventDefault(), onDrop:()=>{ if(this.dragId){ this.setStatus(this.dragId, s.key); this.dragId=null; } } };\n    });\n\n    // ----- Calendar -----\n    const y=this.state.calYear, m=this.state.calMonth;\n    const first=new Date(y,m,1); const lead=(first.getDay()+6)%7; // lunes primero\n    const dim=new Date(y,m+1,0).getDate();\n    const byDate={};\n    this.state.orders.filter(o=>o.estado!=='anulado'&&o.fecha).forEach(o=>{ (byDate[o.fecha]=byDate[o.fecha]||[]).push(o); });\n    const calendarDays=[];\n    for(let i=0;i<lead;i++) calendarDays.push({ num:'', inMonth:false, bg:'transparent', border:'transparent', numColor:'#bbb', opacity:0.4, orders:[], conflict:false });\n    for(let d=1; d<=dim; d++){\n      const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');\n      const dayOrders=(byDate[ds]||[]).sort((a,b)=>(a.hora||'').localeCompare(b.hora||''));\n      const hours=dayOrders.map(o=>o.hora).filter(Boolean);\n      const conflict=hours.some((h,i)=>hours.indexOf(h)!==i);\n      const isToday=ds===this.TODAY;\n      calendarDays.push({\n        num:d, inMonth:true, isToday, opacity:1,\n        bg: isToday?'#FBEDF0':'#fff', border: isToday?'#7A1228':'#eee2c8', numColor: isToday?'#7A1228':'#5d4f3c',\n        conflict,\n        orders: dayOrders.map(o=>{ const s=this.st(o.estado); return { horaLabel:o.hora||'', cliente:o.nombre.split(' ')[0], chipBg:s.bg, chipColor:s.color, open:()=>this.selectOrder(o.id) }; }),\n      });\n    }\n\n    // ----- Clients -----\n    const map={};\n    this.state.orders.forEach(o=>{\n      const key=o.telefono||o.nombre;\n      if(!map[key]) map[key]={ nombre:o.nombre, telefono:o.telefono||'—', email:o.email||'', count:0, total:0, last:'' };\n      const c=map[key]; c.count++; if(o.estado!=='anulado') c.total+=this.orderAmount(o);\n      if(!c.last || (o.fecha||'')>c.last) c.last=o.fecha||'';\n      if(o.email && !c.email) c.email=o.email;\n    });\n    const clients=Object.values(map).sort((a,b)=>b.total-a.total).map(c=>({\n      nombre:c.nombre, telefono:c.telefono, email:c.email,\n      initials:(c.nombre||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase(),\n      count:c.count, totalLabel:this.money(c.total), lastLabel:c.last?this.fmtFechaLarga(c.last):'—',\n      open: () => { this.setState({ query:c.nombre, view:'kanban' }); },\n    }));\n\n    // ----- Ficha -----\n    const sel=this.state.orders.find(o=>o.id===this.state.selectedId);\n    let ficha={ fichaStatusLabel:'', fichaStatusColor:'#7A1228', fichaCliente:'', fichaTel:'', fichaEmail:'', fichaWaLink:'#', fichaItems:[], fichaHasPerso:false, fichaPerso:'', fichaHasNotes:false, fichaNotes:'', fichaFecha:'', fichaHora:'', fichaImporteEst:'', fichaActions:[], fichaHistory:[] };\n    if(sel){\n      const s=this.st(sel.estado);\n      const nextActions=[\n        { to:'confirmado', label:'Confirmar' }, { to:'pagado', label:'Pagado' },\n        { to:'elaboracion', label:'A elaboración' }, { to:'listo', label:'Listo' }, { to:'entregado', label:'Entregado' },\n      ];\n      ficha={\n        fichaStatusLabel:s.label, fichaStatusColor:s.color, fichaCliente:sel.nombre,\n        fichaTel:sel.telefono||'—', fichaEmail:sel.email||'Sin email',\n        fichaWaLink: sel.telefono ? ('https://wa.me/'+sel.telefono) : '#',\n        fichaItems: (sel.items&&sel.items.length? sel.items.map(it=>({line:it.qty+'× '+it.name})) : [{line:sel.tipo||'—'}]),\n        fichaHasPerso: !!sel.personalizacion, fichaPerso:sel.personalizacion,\n        fichaHasNotes: !!sel.notas, fichaNotes:sel.notas,\n        fichaFecha:this.fmtFechaLarga(sel.fecha), fichaHora:sel.hora?('a las '+sel.hora):'Hora por confirmar',\n        fichaImporteEst:this.money(sel.importeEst),\n        fichaActions: nextActions.map(a=>{ const stc=this.st(a.to); const active=sel.estado===a.to; return { label:a.label, bg:active?stc.color:stc.bg, color:active?'#fff':stc.color, border:stc.border, do:()=>this.setStatus(sel.id,a.to) }; }),\n        fichaHistory: (sel.historial||[]).map(h=>{ const stc=this.st(h.estado); return { label:stc.label, color:stc.color, when:this.fmtFecha(h.ts) }; }),\n      };\n    }\n\n    const nf=this.state.newForm;\n\n    return {\n      logoSrc: (typeof window!=='undefined'&&(window.NK_LOGO_RED||window.NK_LOGO))?(window.NK_LOGO_RED||window.NK_LOGO):'logo.png',\n      tabs,\n      query:this.state.query, setQuery:(e)=>this.setState({query:e.target.value}),\n      openNew:()=>this.openNew(),\n      isHome:view==='home', isKanban:view==='kanban', isCalendar:view==='calendar', isClients:view==='clients',\n\n      // home\n      todayLabel: this.fmtFechaLarga(this.TODAY).replace(/^./, c=>c.toUpperCase()),\n      kpis,\n      todayOrders: todayOrders.map(o=>{ const s=this.st(o.estado); return { cliente:o.nombre, tipoLabel:o.tipo||'—', horaLabel:o.hora||'sin hora', importeLabel:this.money(this.orderAmount(o)), statusColor:s.color, open:()=>this.selectOrder(o.id) }; }),\n      hasToday: todayOrders.length>0, noToday: todayOrders.length===0,\n      revenueLabel:this.money(revenue), revenueCount:monthRevOrders.length,\n      pendingCount:this.state.orders.filter(o=>['nuevo','confirmado','pagado','elaboracion'].includes(o.estado)).length,\n      readyCount:cnt('listo'),\n\n      // kanban\n      statusFilters, columns,\n\n      // calendar\n      monthLabel:this.MES[m]+' '+y, weekdays:['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'],\n      calendarDays, prevMonth:()=>this.prevMonth(), nextMonth:()=>this.nextMonth(), todayMonth:()=>this.todayMonth(),\n\n      // clients\n      clients, hasClients:clients.length>0, noClients:clients.length===0,\n\n      // ficha\n      ...ficha,\n      fichaOpacity: sel?1:0, fichaEvents: sel?'auto':'none', fichaY: sel?'0%':'100%',\n      closeFicha:()=>this.closeFicha(), stop:(e)=>e.stopPropagation(),\n      fichaImporteFinal:this.state.fichaImporteFinal, setImporteFinal:(e)=>this.setState({fichaImporteFinal:e.target.value}),\n      fichaInternalNote:this.state.fichaInternalNote, setInternalNote:(e)=>this.setState({fichaInternalNote:e.target.value}),\n      duplicateOrder:()=>this.duplicateOrder(), anularOrder:()=>this.anularOrder(), deleteOrder:()=>this.deleteOrder(),\n\n      // nuevo\n      newOpacity:this.state.newOpen?1:0, newEvents:this.state.newOpen?'auto':'none', newScale:this.state.newOpen?'1':'.92',\n      closeNew:()=>this.closeNew(), nf,\n      nfSet:{ nombre:(e)=>this.nfSet('nombre',e.target.value), telefono:(e)=>this.nfSet('telefono',e.target.value), importe:(e)=>this.nfSet('importe',e.target.value), tipo:(e)=>this.nfSet('tipo',e.target.value), fecha:(e)=>this.nfSet('fecha',e.target.value), hora:(e)=>this.nfSet('hora',e.target.value) },\n      saveNew:()=>this.saveNew(), newError:!!this.state.newError, newErrorMsg:this.state.newError,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
